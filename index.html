<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WORD LAB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: light; }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", "Noto Sans KR", "Segoe UI", sans-serif;
      background: #f5f2ec;
      color: #1a1a2e;
    }

    main {
      min-height: 100vh;
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 0;
    }

    .hero {
      width: 100%;
      background: #ffffff;
      border: 1px solid #ddd8cc;
      border-radius: 28px;
      box-shadow: 0 18px 34px rgba(30, 42, 39, 0.06);
      padding: clamp(28px, 6vw, 56px);
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .title {
      margin: 0;
      font-family: "Lexend", "Plus Jakarta Sans", sans-serif;
      font-size: clamp(2rem, 6.8vw, 4.4rem);
      line-height: 0.92;
      letter-spacing: -0.08em;
      color: #163f42;
      white-space: nowrap;
    }

    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 16px;
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      background: #1f6b61;
      color: #ffffff;
    }

    @media (max-width: 520px) {
      main {
        width: min(100%, calc(100% - 20px));
        padding: 10px 0;
      }

      .hero {
        border-radius: 22px;
        padding: 22px;
      }

      .hero-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .primary-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="hero-top">
        <h1 class="title">WORD LAB</h1>
        <a class="primary-btn" href="./app/index.html">&#xC571; &#xC5F4;&#xAE30;</a>
      </div>
    </section>
  </main>
</body>
</html>
